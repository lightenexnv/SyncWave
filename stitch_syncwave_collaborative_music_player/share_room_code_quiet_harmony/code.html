<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            font-variation-settings: 'FILL' 1;

        /* Subtle pulse for joining avatars */
        @keyframes subtlePulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

<style>

<body class="bg-background text-on-background min-h-screen flex flex-col font-body-lg antialiased">
<!-- Canvas/Main Content for a Linear/Transactional Flow -->
<!-- Navigation shell is suppressed per guidelines for linear flows -->
<!-- Custom Top App Bar for Linear Flow (Close action) -->
<header class="flex justify-between items-center w-full px-margin-mobile h-[48px] bg-background/80 backdrop-blur-md sticky top-0 z-40">
<button aria-label="Close" class="h-[48px] w-[48px] flex items-center justify-start text-on-surface hover:bg-surface-container-low transition-colors rounded-full">
<span class="material-symbols-outlined">close</span>
</button>
<span class="font-headline-lg-mobile text-headline-lg-mobile text-primary tracking-tighter">SyncWave</span>
<div class="h-[48px] w-[48px]"></div> <!-- Spacer for balance -->
</header>
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile py-8 md:py-16 w-full max-w-md mx-auto">
<!-- Room Info Header -->
<div class="text-center mb-12 space-y-2">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-background">Create Room</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Share this code with friends</p>
</div>
<!-- The Code Display -->
<div class="w-full mb-16 flex flex-col items-center relative group">
<div class="absolute inset-0 bg-primary/5 blur-3xl rounded-full scale-150 -z-10 group-hover:bg-primary/10 transition-colors duration-500"></div>
<div class="font-bold text-[56px] leading-[64px] tracking-[-0.02em] text-primary tracking-widest tabular-nums select-all cursor-pointer hover:scale-[1.02] transition-transform">
                482931
            </div>
<!-- Action Buttons -->
<div class="flex gap-4 mt-8">
<button class="flex items-center gap-2 bg-surface-container-high hover:bg-surface-container-highest text-on-surface font-label-lg text-label-lg px-6 h-[48px] rounded-full transition-colors">
<span class="material-symbols-outlined text-[20px]">content_copy</span>
                    Copy Code
                </button>
<button class="flex items-center gap-2 bg-primary hover:bg-primary-container text-on-primary font-label-lg text-label-lg px-6 h-[48px] rounded-full transition-colors shadow-md shadow-primary/20">
<span class="material-symbols-outlined text-[20px] fill-icon">share</span>
                    Share
                </button>
</div>
</div>
<!-- Connectivity / Waiting Room -->
<div class="w-full flex flex-col items-center mt-auto pb-8">
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider mb-6">Waiting for friends to join...</p>
<div class="flex justify-center items-center gap-3">
<!-- Host (You) -->
<div class="relative flex flex-col items-center">
<img alt="Host Profile" class="w-16 h-16 rounded-full object-cover border-2 border-primary bg-surface-container-low shadow-sm" data-alt="A close-up, modern headshot of a person looking forward, stylized with soft, warm studio lighting typical of high-end corporate profiles. Light mode aesthetic with a clean white background and a pop of vibrant red." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA_xel-37KRczc7cRHbYVdUTczXz3T_Rf1tlYNgftf-yLe_9g9h4LLo6qjtJz5VffdAkz9C3XIJYnyKFrmaWuFHS10Lp1d_Fg5WON4WtheG0c6fm7OmuRaSTqIz3_djx4qjHpkqO1QRKPsw9RIM1Dr-wCFnl1HDt6oNvcyHMnWKCBpE21CJs5a8jFxiW5R2LQ0t0X-FT-c-8JHPwD3o-tS_ySOXDTqkOXxJswbgTHkAvrVOONKNTjYcDLgDyFw-Xm6U_cXeOj2AvAo"/>
<div class="absolute -bottom-1 -right-1 bg-surface rounded-full p-0.5">
<div class="bg-primary text-on-primary rounded-full w-5 h-5 flex items-center justify-center">
<span class="material-symbols-outlined text-[12px] fill-icon">star</span>
</div>
</div>
</div>
<!-- Joining Slot 1 (Connecting) -->
<div class="w-14 h-14 rounded-full border-2 border-dashed border-outline-variant bg-surface-container-lowest flex items-center justify-center pulse-avatar">
<span class="material-symbols-outlined text-outline text-[20px]">more_horiz</span>
</div>
<!-- Joining Slot 2 (Empty) -->
<div class="w-14 h-14 rounded-full border-2 border-dashed border-surface-variant bg-surface flex items-center justify-center opacity-50">
</div>
</div>
<!-- Optional subtle indicator of connection status -->
<div class="flex items-center gap-2 mt-8 text-on-surface-variant/60">
<div class="w-2 h-2 rounded-full bg-secondary-container animate-pulse"></div>
<span class="font-label-sm text-label-sm">Room is live and discoverable</span>
</div>
</div>
</main>
<script>
        // Simple copy functionality simulation
        document.querySelectorAll('button').forEach(button => {
            if(button.textContent.includes('Copy Code')) {
                button.addEventListener('click', function() {
                    const originalText = this.innerHTML;
                    this.innerHTML = '<span class="material-symbols-outlined text-[20px]">check</span> Copied!';
                    this.classList.add('bg-primary-container', 'text-on-primary-container');
                    this.classList.remove('bg-surface-container-high', 'text-on-surface');
                    
                    setTimeout(() => {
                        this.innerHTML = originalText;
                        this.classList.remove('bg-primary-container', 'text-on-primary-container');
                        this.classList.add('bg-surface-container-high', 'text-on-surface');
                    }, 2000);
                });
            }
        });
    </script>
