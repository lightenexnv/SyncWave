<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9f9fc;
        }
        .soft-elevation {
            box-shadow: 0 4px 20px -2px rgba(88, 86, 214, 0.04), 0 2px 8px -1px rgba(88, 86, 214, 0.02);
        }
        .input-focus-ring:focus-within {
            box-shadow: 0 0 0 2px rgba(88, 86, 214, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

  </head>
<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center overflow-x-hidden p-margin-mobile md:p-margin-desktop">
<!-- Brand Header -->
<header class="fixed top-0 left-0 w-full px-margin-mobile py-8 flex justify-center md:justify-start pointer-events-none">
<h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-primary tracking-tighter opacity-20 pointer-events-auto">SyncWave</h1>
</header>
<main class="w-full max-w-[480px] flex flex-col gap-10 z-10">
<!-- Content Container -->
<div class="flex flex-col gap-2">
<h2 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface tracking-tight">Create account</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Join the harmony of high-end audio and focus.</p>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-6" onsubmit="event.preventDefault();">
<div class="flex flex-col gap-4">
<!-- Name Field -->
<div class="group flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface-variant px-1" for="name">Full Name</label>
<div class="flex items-center gap-3 bg-surface-container-lowest border border-outline-variant/30 rounded-lg h-14 px-4 transition-all duration-300 input-focus-ring group-hover:border-primary/30">
<span class="material-symbols-outlined text-on-surface-variant/60">person</span>
<input class="bg-transparent border-none focus:ring-0 w-full font-body-md text-on-surface placeholder:text-on-surface-variant/40" id="name" placeholder="Enter your name" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="group flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface-variant px-1" for="email">Email Address</label>
<div class="flex items-center gap-3 bg-surface-container-lowest border border-outline-variant/30 rounded-lg h-14 px-4 transition-all duration-300 input-focus-ring group-hover:border-primary/30">
<span class="material-symbols-outlined text-on-surface-variant/60">mail</span>
<input class="bg-transparent border-none focus:ring-0 w-full font-body-md text-on-surface placeholder:text-on-surface-variant/40" id="email" placeholder="you@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="group flex flex-col gap-2">
<label class="font-label-lg text-label-lg text-on-surface-variant px-1" for="password">Password</label>
<div class="flex items-center gap-3 bg-surface-container-lowest border border-outline-variant/30 rounded-lg h-14 px-4 transition-all duration-300 input-focus-ring group-hover:border-primary/30">
<span class="material-symbols-outlined text-on-surface-variant/60">lock</span>
<input class="bg-transparent border-none focus:ring-0 w-full font-body-md text-on-surface placeholder:text-on-surface-variant/40" id="password" placeholder="Create a strong password" type="password"/>
<button class="text-on-surface-variant/60 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
</div>
<!-- Primary Action -->
<button class="bg-primary-container text-on-primary-container font-label-lg text-label-lg h-14 rounded-lg soft-elevation hover:bg-primary transition-all duration-300 active:scale-[0.98]" type="submit">
                Create Account
            </button>
</form>
<!-- Divider -->
<div class="flex items-center gap-4">
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
<span class="font-label-sm text-label-sm text-on-surface-variant/60 uppercase tracking-widest">or continue with</span>
<div class="h-[1px] flex-1 bg-outline-variant/30"></div>
</div>
<!-- Social Integration -->
<div class="flex flex-col gap-4">
<button class="flex items-center justify-center gap-3 bg-surface-container-lowest border border-outline-variant/30 text-on-surface font-label-lg text-label-lg h- touch-target-min rounded-lg hover:bg-surface-container-low transition-all duration-300 group">
<svg class="group-hover:scale-110 transition-transform" fill="none" height="20" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                Sign up with Google
            </button>
</div>
<!-- Footer -->
<p class="text-center font-body-md text-body-md text-on-surface-variant">
            Already have an account? 
            <a class="text-primary font-bold hover:underline underline-offset-4 decoration-2 decoration-primary-fixed-dim transition-all" href="#">Sign in</a>
</p>
</main>
<!-- Decorative Atmospheric Elements -->
<div class="fixed top-[-10%] right-[-10%] w-[40vw] h-[40vw] bg-primary/5 rounded-full blur-[120px] -z-10 pointer-events-none"></div>
<div class="fixed bottom-[-5%] left-[-5%] w-[30vw] h-[30vw] bg-secondary-container/20 rounded-full blur-[80px] -z-10 pointer-events-none"></div>
<script>
        // Simple Interaction Feedback
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('border-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('border-primary');
            });
        });

        // Micro-interaction for form submission
        const form = document.querySelector('form');
        const submitBtn = form.querySelector('button[type="submit"]');

        form.addEventListener('submit', () => {
            submitBtn.innerHTML = '<span class="flex items-center gap-2 justify-center"><svg class="animate-spin h-5 w-5 text-current" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Creating Account...</span>';
            submitBtn.disabled = true;
            setTimeout(() => {
                submitBtn.innerHTML = 'Account Created';
                submitBtn.classList.remove('bg-primary-container');
                submitBtn.classList.add('bg-green-600', 'text-white');
            }, 1500);
        });
    </script>
</body></html>
