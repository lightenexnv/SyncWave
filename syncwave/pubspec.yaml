name: syncwave
description: "SyncWave — collaborative music listening app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  firebase_core: ^4.4.0
  firebase_auth: ^6.0.0
  firebase_database: ^12.1.3
  google_sign_in: ^6.2.1
  http: ^1.6.0
  get: ^4.7.3
  file_picker: ^10.0.0
  just_audio: ^0.9.42

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logos/


